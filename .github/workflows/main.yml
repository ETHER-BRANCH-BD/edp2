name: ETHER SERVER DYNAMIC

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of cycles"
        required: false
        default: "1"

permissions:
  contents: read
  actions: write

jobs:
  full:
    runs-on: windows-latest
    timeout-minutes: 360

    env:
      RDP_USER: sedor
      RDP_PASS: Mariya@1981
      MUMU_MGR: 'C:\Program Files\Netease\MuMuPlayer\nx_main\MuMuManager.exe'
      # Apnar OAuth Credentials
      TS_CLIENT_ID: "kQymft8y2J11CNTRL"
      TS_CLIENT_SECRET: "tskey-client-kQymft8y2J11CNTRL-Hgcg4hNmdRSaBWP1H1TmSSQ4b54cD7oE"

    steps:

    # ---------------- BASIC INFO ----------------
    - name: Show runner info
      shell: pwsh
      run: |
        whoami
        systeminfo | findstr /B /C:"OS Name"

    # ---------------- TAILSCALE SETUP (SMART AUTO) ----------------
    - name: Install and Start Tailscale
      shell: pwsh
      run: |
        # 1. Install Tailscale
        $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"
        if (-not (Test-Path $exe)) {
          Invoke-WebRequest `
            https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi `
            -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait
        }
        Start-Service Tailscale
        Start-Sleep 5

        # 2. Get Access Token via OAuth
        $oauthBody = @{
            client_id     = $env:TS_CLIENT_ID
            client_secret = $env:TS_CLIENT_SECRET
        }
        $tokenResponse = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/oauth/token" -Method Post -Body $oauthBody
        $accessToken = $tokenResponse.access_token

        # 3. AUTO-DETECT TAILNET NAME (Error fix)
        $authHeader = @{ Authorization = "Bearer $accessToken" }
        $tailnetInfo = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnets" -Headers $authHeader
        $myTailnet = $tailnetInfo.tailnets[0]
        Write-Host "Detected Tailnet Name: $myTailnet"

        # 4. Generate Ephemeral Auth Key
        $keyBody = @{
            capabilities = @{
                devices = @{
                    create = @{ reusable = $false; ephemeral = $true; preauthorized = $true }
                }
            }
            expirySeconds = 3600
        } | ConvertTo-Json

        $apiUrl = "https://api.tailscale.com/api/v2/tailnet/$myTailnet/keys"
        $keyResponse = Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $authHeader -Body $keyBody -ContentType "application/json"
        $newAuthKey = $keyResponse.key

        # 5. Connect
        $randomName = "bullet-$(Get-Random -Minimum 100 -Maximum 999)"
        & $exe up --authkey "$newAuthKey" --hostname "$randomName"

        # 6. Fetch IP
        for ($i=0; $i -lt 15; $i++) {
          $ip = & $exe ip -4 | Select-Object -First 1
          if ($ip) { break }
          Start-Sleep 3
        }
        echo "TS_IP=$ip" >> $env:GITHUB_ENV
        Write-Host "Tailscale IP: $ip"

    # ---------------- RDP SETUP ----------------
    - name: Enable RDP
      shell: pwsh
      run: |
        $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force
        if (-not (Get-LocalUser $env:RDP_USER -EA SilentlyContinue)) {
          New-LocalUser $env:RDP_USER -Password $sec
          Add-LocalGroupMember Administrators $env:RDP_USER
          Add-LocalGroupMember "Remote Desktop Users" $env:RDP_USER
        }
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    # ---------------- TOOLS & MUMU ----------------
    - name: Install Apps & MuMu
      shell: pwsh
      run: |
        pip install gdown customtkinter uiautomator2 playwright opencv-python
        playwright install
        
        gdown "166R8NrD3kHJZTNdhI2P8NIEzurgpf5Gp" -O "$env:USERPROFILE\Downloads\fb.mumudata" 
        $mumuUrl = "https://a11.gdl.netease.com/MuMu_5.0.7_gw-win-download_all_1761811684.exe"
        Invoke-WebRequest -Uri $mumuUrl -OutFile "$env:TEMP\mumu.exe"
        Start-Process "$env:TEMP\mumu.exe" -ArgumentList "/S" -Wait
        Start-Sleep -Seconds 50

    # ---------------- KEEP ALIVE ----------------
    - name: Keep alive
      shell: pwsh
      run: |
        Write-Host "Connect RDP to IP: $env:TS_IP"
        Start-Sleep -Seconds 21600
