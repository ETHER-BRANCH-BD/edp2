name: ETHER SERVER 5.3648

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of cycles"
        required: false
        default: "1"

permissions:
  contents: read
  actions: write

jobs:
  full:
    runs-on: windows-latest
    timeout-minutes: 360

    env:
      RDP_USER: sedor
      RDP_PASS: Mariya@1981
      MUMU_MGR: 'C:\Program Files\Netease\MuMuPlayer\nx_main\MuMuManager.exe'
      # Apnar deya API Access Token
      TS_API_TOKEN: "tskey-api-kfijnds9kK11CNTRL-rwjxd1ZXjvABKqHPeJi3vAFJzQGURkEvg"

    steps:

    # ---------------- BASIC INFO ----------------
    - name: Show runner info
      shell: pwsh
      run: |
        whoami
        systeminfo | findstr /B /C:"OS Name"

    # ---------------- TAILSCALE AUTO-AUTH ----------------
    - name: Install and Start Tailscale
      shell: pwsh
      run: |
        # 1. Install Tailscale
        $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"
        if (-not (Test-Path $exe)) {
          Invoke-WebRequest `
            https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi `
            -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait
        }
        Start-Service Tailscale
        Start-Sleep 5

        # 2. Auto-detect Tailnet Name and Generate Ephemeral Key
        $authHeader = @{ Authorization = "Bearer $($env:TS_API_TOKEN)" }
        $whois = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnets" -Headers $authHeader
        $tailnet = $whois.tailnets[0]
        
        $body = @{
            capabilities = @{
                devices = @{
                    create = @{
                        reusable = $false
                        ephemeral = $true
                        preauthorized = $true
                    }
                }
            }
            expirySeconds = 3600
        } | ConvertTo-Json

        $apiUrl = "https://api.tailscale.com/api/v2/tailnet/$tailnet/keys"
        $response = Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $authHeader -Body $body -ContentType "application/json"
        $newAuthKey = $response.key

        # 3. Connect with unique hostname to avoid conflicts
        $randomName = "bullet-$(Get-Random -Minimum 100 -Maximum 999)"
        & $exe up --authkey "$newAuthKey" --hostname "$randomName"

        # 4. Fetch Tailscale IP
        for ($i=0; $i -lt 10; $i++) {
          $ip = & $exe ip -4 | Select-Object -First 1
          if ($ip) { break }
          Start-Sleep 3
        }

        if (-not $ip) { throw "Tailscale IP not found" }
        echo "TS_IP=$ip" >> $env:GITHUB_ENV
        Write-Host "Tailscale IP: $ip"

    # ---------------- RDP ----------------
    - name: Enable RDP
      shell: pwsh
      run: |
        $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force
        if (-not (Get-LocalUser $env:RDP_USER -EA SilentlyContinue)) {
          New-LocalUser $env:RDP_USER -Password $sec
          Add-LocalGroupMember Administrators $env:RDP_USER
          Add-LocalGroupMember "Remote Desktop Users" $env:RDP_USER
        }
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    # ---------------- TOOLS ----------------
    - name: Install Modules
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install gdown customtkinter uiautomator2 playwright opencv-python
        playwright install

    # ---------------- MUMU AUTO SETUP ----------------
    - name: Auto MuMu Download & Restore
      shell: pwsh
      run: |
        gdown "166R8NrD3kHJZTNdhI2P8NIEzurgpf5Gp" -O "$env:USERPROFILE\Downloads\fb.mumudata" 
        gdown --folder "17fags-9sHCQU2ZlNe1BySx-7gdU1cla2" --output "$env:USERPROFILE\Desktop\fbcreator_folder"

        $mumuUrl = "https://a11.gdl.netease.com/MuMu_5.0.7_gw-win-download_all_1761811684.exe"
        Invoke-WebRequest -Uri $mumuUrl -OutFile "$env:TEMP\mumu.exe"
        Start-Process "$env:TEMP\mumu.exe" -ArgumentList "/S" -Wait
        Start-Sleep -Seconds 50

        if (Test-Path $env:MUMU_MGR) {
            for ($i=0; $i -lt 3; $i++) {
                & $env:MUMU_MGR restore --index $i --file "$env:USERPROFILE\Downloads\fb.mumudata"
                & $env:MUMU_MGR config index $i cpu 1 memory 4096 graphics_type 2 disk_mode 2
                & $env:MUMU_MGR launch index $i
                Start-Sleep -Seconds 15
            }
        }

    # ---------------- KEEP ALIVE ----------------
    - name: Keep alive
      shell: pwsh
      run: |
        Write-Host "Connect via RDP to IP: $env:TS_IP"
        Start-Sleep -Seconds 21600

    - name: Done
      shell: pwsh
      run: |
        Write-Host "DONE"
